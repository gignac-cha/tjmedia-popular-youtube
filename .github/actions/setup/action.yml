name: Setup
description: Checkout, install pnpm, Node.js, and dependencies

runs:
  using: composite
  steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - uses: pnpm/action-setup@v4
    - uses: actions/setup-node@v4
      with:
        node-version: latest
        cache: pnpm
    - run: pnpm install --frozen-lockfile
      shell: bash
