    <title>YouTube Search Worker</title>
  </head>
  <body>
    <h1>YouTube Search Worker</h1>
    <p>Available routes:</p>
    <ul>
      <li><code>GET /</code> or <code>GET /help</code> returns this document.</li>
      <li><code>GET /search?search_query=...</code> returns topic-first deduped YouTube video JSON.</li>
      <li><code>OPTIONS *</code> returns CORS headers.</li>
      <li><code>HEAD *</code> returns an empty success response.</li>
    </ul>
  </body>
</html>
